name: Daily Job Search

on:
  schedule:
    # 12:00 UTC = 09:00 BRT
    - cron: "0 12 * * *"
  workflow_dispatch: # permite rodar manualmente

jobs:
  search-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/job-search/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/job-search/requirements.txt

      - name: Run job search
        env:
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID:   ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:  ${{ secrets.ADZUNA_APP_KEY }}
        run: python scripts/job-search/search.py

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN:   ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:  ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel deploy --prod --yes \
            --token "$VERCEL_TOKEN" \
            --build-env VERCEL_ORG_ID="$VERCEL_ORG_ID" \
            --build-env VERCEL_PROJECT_ID="$VERCEL_PROJECT_ID"
